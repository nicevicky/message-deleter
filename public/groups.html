<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>GroupPilot — My Groups</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#00d4ff;--accent:#7c3aed;--bg:#050a14;--surface:#0d1626;--card:#111d30;--border:rgba(0,212,255,0.12);--text:#e8f4fd;--muted:#5a7a99;--danger:#ff4757;--success:#00e676;--warn:#ffb300}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:76px}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:rgba(13,22,38,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:14px;flex-shrink:0}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;flex:1}
.add-fab{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--primary));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px;box-shadow:0 3px 10px rgba(0,212,255,0.3);flex-shrink:0}
.search-wrap{padding:14px 20px 0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
.search-box i{color:var(--muted);font-size:13px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif}
.search-box input::placeholder{color:var(--muted)}
.chips{display:flex;gap:8px;padding:12px 20px 8px;overflow-x:auto}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.chip.active{background:rgba(0,212,255,0.1);border-color:var(--primary);color:var(--primary)}
.list{padding:0 20px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
.group-card:active{transform:scale(0.98);border-color:var(--primary)}
.gc-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--primary));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 4px 12px rgba(124,58,237,0.3);flex-shrink:0}
.gc-icon.dim{background:linear-gradient(135deg,#2a3a50,#3a4a60);box-shadow:none}
.gc-body{flex:1;min-width:0}
.gc-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.gc-tag{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--border);color:var(--muted)}
.gc-arrow{color:var(--muted);font-size:11px;margin-top:4px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.badge-active{background:rgba(0,230,118,0.1);color:var(--success)}
.badge-warn{background:rgba(255,179,0,0.1);color:var(--warn)}
.empty{text-align:center;padding:40px 10px}
.empty i{font-size:44px;color:var(--muted);opacity:.3;margin-bottom:12px;display:block}
.empty p{color:var(--muted);font-size:13px}
.add-btn{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:11px 22px;background:linear-gradient(135deg,var(--accent),var(--primary));border-radius:12px;color:#fff;font-size:13px;font-weight:500;text-decoration:none;box-shadow:0 4px 14px rgba(0,212,255,0.25)}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:16px}
.skel-card{height:76px;margin-bottom:10px}
@keyframes shimmer{to{background-position:-200% 0}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,22,38,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:4px;color:var(--muted);font-size:10px;text-decoration:none;transition:color .2s}
.nav-item i{font-size:20px}
.nav-item.active{color:var(--primary)}
.nav-item.active i{filter:drop-shadow(0 0 6px var(--primary))}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
  <div class="topbar-title">My Groups</div>
  <button class="add-fab" onclick="window.open('https://t.me/GroupPilotBot?startgroup=true','_blank')" title="Add to Group">
    <i class="fa-solid fa-plus"></i>
  </button>
</div>

<div class="search-wrap">
  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search groups..." oninput="render()"/>
  </div>
</div>

<div class="chips">
  <div class="chip active" data-f="all"      onclick="setFilter('all',this)">All</div>
  <div class="chip"        data-f="active"   onclick="setFilter('active',this)">Active</div>
  <div class="chip"        data-f="inactive" onclick="setFilter('inactive',this)">Needs Admin</div>
  <div class="chip"        data-f="approval" onclick="setFilter('approval',this)">Approval Mode</div>
</div>

<div class="list" id="listWrap">
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a class="nav-item active" href="groups.html"><i class="fa-solid fa-layer-group"></i><span>Groups</span></a>
  <a class="nav-item" href="reports.html"><i class="fa-solid fa-flag"></i><span>Reports</span></a>
  <a class="nav-item" href="moderation.html"><i class="fa-solid fa-shield-halved"></i><span>Mods</span></a>
  <a class="nav-item" href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
</nav>

<script>
const SUPABASE_URL      = 'https://mwxrklxxgwbaemqnbvda.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13eHJrbHh4Z3diYWVtcW5idmRhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NDI4MTYyOCwiZXhwIjoyMDc5ODU3NjI4fQ.mTfLl-MWCNfENzTX8E39fmlnMmVHNsif5uBFPcLpd28';
const sb  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tg  = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setBackgroundColor('#050a14');}

const userData = JSON.parse(sessionStorage.getItem('gp_user')||'null');
if(!userData){window.location.href='index.html';}

let all=[], filter='all';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setFilter(f,el){filter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const items=all.filter(g=>{
    if(!g.chat_title.toLowerCase().includes(q))return false;
    if(filter==='active')   return g.bot_is_admin;
    if(filter==='inactive') return !g.bot_is_admin;
    if(filter==='approval') return g.require_approval;
    return true;
  });
  const c=document.getElementById('listWrap');
  if(!items.length){
    c.innerHTML=`<div class="empty"><i class="fa-solid fa-layer-group"></i><p>${all.length?'No groups match your filter.':'No groups yet. Add GroupPilot to a Telegram group.'}</p>
      ${all.length?'':'<a class="add-btn" href="https://t.me/GroupPilotBot?startgroup=true" target="_blank"><i class="fa-solid fa-plus"></i> Add to Group</a>'}</div>`;
    return;
  }
  c.innerHTML=items.map(g=>{
    const tags=[];
    if(g.delete_links)    tags.push('<div class="gc-tag"><i class="fa-solid fa-link-slash" style="margin-right:3px;font-size:9px"></i>No Links</div>');
    if(g.delete_promotions)tags.push('<div class="gc-tag"><i class="fa-solid fa-ban" style="margin-right:3px;font-size:9px"></i>No Promo</div>');
    if(g.require_approval) tags.push('<div class="gc-tag"><i class="fa-solid fa-user-clock" style="margin-right:3px;font-size:9px"></i>Approval</div>');
    if(g.sticker_protect)  tags.push('<div class="gc-tag"><i class="fa-solid fa-face-smile" style="margin-right:3px;font-size:9px"></i>No Stickers</div>');
    return `<a class="group-card" href="group-settings.html?id=${g.chat_id}">
      <div class="gc-icon ${g.bot_is_admin?'':'dim'}"><i class="fa-solid fa-users"></i></div>
      <div class="gc-body">
        <div class="gc-name">${esc(g.chat_title)}</div>
        <div class="gc-meta">
          <span class="badge ${g.bot_is_admin?'badge-active':'badge-warn'}"><i class="fa-solid fa-circle" style="font-size:5px"></i>${g.bot_is_admin?'Active':'Needs Admin'}</span>
          <span style="font-size:10px;font-family:monospace">${g.chat_id}</span>
        </div>
        ${tags.length?`<div class="gc-tags">${tags.join('')}</div>`:''}
      </div>
      <i class="fa-solid fa-chevron-right gc-arrow"></i>
    </a>`;
  }).join('');
}

async function load(){
  const {data}=await sb.from('groups').select('*').eq('added_by',userData.telegram_id).order('created_at',{ascending:false});
  all=data||[];
  render();
}
load();
</script>
</body>
</html>
