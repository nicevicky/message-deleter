<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>GroupPilot — Moderation</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#00d4ff;--accent:#7c3aed;--bg:#050a14;--surface:#0d1626;--card:#111d30;--border:rgba(0,212,255,0.12);--text:#e8f4fd;--muted:#5a7a99;--danger:#ff4757;--success:#00e676;--warn:#ffb300}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:76px}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:rgba(13,22,38,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:14px}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;flex:1}
.tab-row{display:flex;padding:14px 20px 0}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.panel{display:none;padding:14px 20px}
.panel.active{display:block}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:opacity .3s}
.rec-ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ic-ban{background:rgba(255,71,87,0.1);color:var(--danger)}
.ic-mute{background:rgba(255,179,0,0.1);color:var(--warn)}
.ic-warn{background:rgba(124,58,237,0.1);color:#c084fc}
.rec-body{flex:1;min-width:0}
.rec-user{font-size:13px;font-weight:500}
.rec-reason{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-time{font-size:10px;color:var(--muted);margin-top:4px}
.act-btn{padding:6px 11px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-top:2px}
.btn-unban{background:rgba(0,230,118,0.1);color:var(--success);border:1px solid rgba(0,230,118,0.2)}
.btn-unmute{background:rgba(0,212,255,0.1);color:var(--primary);border:1px solid rgba(0,212,255,0.2)}
.empty{text-align:center;padding:36px 10px}
.empty i{font-size:40px;color:var(--muted);opacity:.3;margin-bottom:10px;display:block}
.empty p{color:var(--muted);font-size:13px}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:14px}
.skel-card{height:64px;margin-bottom:8px}
@keyframes shimmer{to{background-position:-200% 0}}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;display:flex;align-items:center;gap:8px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,22,38,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:4px;color:var(--muted);font-size:10px;text-decoration:none;transition:color .2s}
.nav-item i{font-size:20px}
.nav-item.active{color:var(--primary)}
.nav-item.active i{filter:drop-shadow(0 0 6px var(--primary))}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
  <div class="topbar-title"><i class="fa-solid fa-shield-halved" style="color:var(--primary);font-size:16px;margin-right:8px"></i>Moderation</div>
</div>

<div class="tab-row">
  <div class="tab active" onclick="switchTab('bans',this)"><i class="fa-solid fa-ban" style="margin-right:4px"></i>Bans</div>
  <div class="tab"        onclick="switchTab('mutes',this)"><i class="fa-solid fa-microphone-slash" style="margin-right:4px"></i>Mutes</div>
  <div class="tab"        onclick="switchTab('warnings',this)"><i class="fa-solid fa-triangle-exclamation" style="margin-right:4px"></i>Warnings</div>
</div>

<div class="panel active" id="panel-bans">
  <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
</div>
<div class="panel" id="panel-mutes">
  <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
</div>
<div class="panel" id="panel-warnings">
  <div class="skeleton skel-card"></div><div class="skeleton skel-card"></div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle" style="color:var(--success)"></i><span id="toastMsg"></span></div>

<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="groups.html"><i class="fa-solid fa-layer-group"></i><span>Groups</span></a>
  <a class="nav-item" href="reports.html"><i class="fa-solid fa-flag"></i><span>Reports</span></a>
  <a class="nav-item active" href="moderation.html"><i class="fa-solid fa-shield-halved"></i><span>Mods</span></a>
  <a class="nav-item" href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
</nav>

<script>
const SUPABASE_URL      = 'https://mwxrklxxgwbaemqnbvda.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13eHJrbHh4Z3diYWVtcW5idmRhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NDI4MTYyOCwiZXhwIjoyMDc5ODU3NjI4fQ.mTfLl-MWCNfENzTX8E39fmlnMmVHNsif5uBFPcLpd28';
const sb  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tg  = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setBackgroundColor('#050a14');}
const userData = JSON.parse(sessionStorage.getItem('gp_user')||'null');
if(!userData){window.location.href='index.html';}

let chatIds=[];

function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function relTime(ts){
  if(!ts)return'—';
  const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000),h=Math.floor(m/60),dy=Math.floor(h/24);
  return dy>0?dy+'d ago':h>0?h+'h ago':m>0?m+'m ago':'just now';
}
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+name).classList.add('active');
}
function empty(msg,icon){return`<div class="empty"><i class="fa-solid ${icon}"></i><p>${msg}</p></div>`;}

async function unbanUser(chatId,userId,cardEl){
  const {error}=await sb.from('bans').update({is_active:false}).eq('chat_id',chatId).eq('user_id',userId);
  if(!error){cardEl.style.opacity='0.4';showToast('User unbanned');}
}
async function unmuteUser(chatId,userId,cardEl){
  const {error}=await sb.from('mutes').update({is_active:false}).eq('chat_id',chatId).eq('user_id',userId);
  if(!error){cardEl.style.opacity='0.4';showToast('User unmuted');}
}

async function loadBans(){
  const p=document.getElementById('panel-bans');
  if(!chatIds.length){p.innerHTML=empty('No groups found','fa-ban');return;}
  const {data}=await sb.from('bans').select('*').in('chat_id',chatIds).eq('is_active',true).order('banned_at',{ascending:false}).limit(50);
  if(!data?.length){p.innerHTML=empty('No active bans','fa-ban');return;}
  p.innerHTML=data.map((b,i)=>`
    <div class="rec-card" id="ban-${i}">
      <div class="rec-ic ic-ban"><i class="fa-solid fa-ban"></i></div>
      <div class="rec-body">
        <div class="rec-user">${b.username?'@'+esc(b.username):'User '+b.user_id}</div>
        <div class="rec-reason">${esc(b.reason||'No reason')}</div>
        <div class="rec-time"><i class="fa-regular fa-clock"></i> ${relTime(b.banned_at)}</div>
      </div>
      <button class="act-btn btn-unban" onclick="unbanUser(${b.chat_id},${b.user_id},document.getElementById('ban-${i}'))">
        <i class="fa-solid fa-unlock"></i> Unban
      </button>
    </div>`).join('');
}

async function loadMutes(){
  const p=document.getElementById('panel-mutes');
  if(!chatIds.length){p.innerHTML=empty('No groups found','fa-microphone-slash');return;}
  const {data}=await sb.from('mutes').select('*').in('chat_id',chatIds).eq('is_active',true).order('muted_at',{ascending:false}).limit(50);
  if(!data?.length){p.innerHTML=empty('No active mutes','fa-microphone-slash');return;}
  p.innerHTML=data.map((m,i)=>`
    <div class="rec-card" id="mute-${i}">
      <div class="rec-ic ic-mute"><i class="fa-solid fa-microphone-slash"></i></div>
      <div class="rec-body">
        <div class="rec-user">${m.username?'@'+esc(m.username):'User '+m.user_id}</div>
        <div class="rec-reason">${esc(m.reason||'No reason')}</div>
        <div class="rec-time">Until: ${m.mute_until?new Date(m.mute_until).toLocaleString():'—'}</div>
      </div>
      <button class="act-btn btn-unmute" onclick="unmuteUser(${m.chat_id},${m.user_id},document.getElementById('mute-${i}'))">
        <i class="fa-solid fa-volume-high"></i> Unmute
      </button>
    </div>`).join('');
}

async function loadWarnings(){
  const p=document.getElementById('panel-warnings');
  if(!chatIds.length){p.innerHTML=empty('No groups found','fa-triangle-exclamation');return;}
  const {data}=await sb.from('warnings').select('*').in('chat_id',chatIds).order('warned_at',{ascending:false}).limit(60);
  if(!data?.length){p.innerHTML=empty('No warnings yet','fa-triangle-exclamation');return;}
  p.innerHTML=data.map(w=>`
    <div class="rec-card">
      <div class="rec-ic ic-warn"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="rec-body">
        <div class="rec-user">${w.username?'@'+esc(w.username):'User '+w.user_id}</div>
        <div class="rec-reason">${esc(w.reason||'No reason')}</div>
        <div class="rec-time">${relTime(w.warned_at)} &bull; Chat: ${w.chat_id}</div>
      </div>
    </div>`).join('');
}

async function init(){
  const {data:groups}=await sb.from('groups').select('chat_id').eq('added_by',userData.telegram_id);
  chatIds=(groups||[]).map(g=>g.chat_id);
  await Promise.all([loadBans(),loadMutes(),loadWarnings()]);
}
init();
</script>
</body>
</html>
