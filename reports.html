<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>GroupPilot — Reports</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--primary:#00d4ff;--accent:#7c3aed;--bg:#050a14;--surface:#0d1626;--card:#111d30;--border:rgba(0,212,255,0.12);--text:#e8f4fd;--muted:#5a7a99;--danger:#ff4757;--success:#00e676;--warn:#ffb300}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:76px}
.topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:rgba(13,22,38,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:14px}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;flex:1}
.pending-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,71,87,0.12);color:var(--danger);border:1px solid rgba(255,71,87,0.25)}
.chips{display:flex;gap:8px;padding:14px 20px 8px;overflow-x:auto}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.chip.active{background:rgba(0,212,255,0.1);border-color:var(--primary);color:var(--primary)}
.list{padding:0 20px}
.rep-card{background:var(--card);border-left:3px solid transparent;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:opacity .3s}
.rep-card.pending{border-left-color:var(--danger)}
.rep-card.resolved{border-left-color:var(--success);opacity:.65}
.rep-card.dismissed{border-left-color:var(--muted);opacity:.5}
.rep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.rep-status{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.st-pending{background:rgba(255,71,87,0.1);color:var(--danger)}
.st-resolved{background:rgba(0,230,118,0.1);color:var(--success)}
.st-dismissed{background:rgba(90,122,153,0.12);color:var(--muted)}
.rep-time{font-size:11px;color:var(--muted)}
.users-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.u-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:12px}
.u-reporter{background:rgba(0,212,255,0.07);color:var(--primary)}
.u-reported{background:rgba(255,71,87,0.07);color:var(--danger)}
.u-arrow{color:var(--muted)}
.rep-reason{font-size:12px;line-height:1.5;padding:8px 10px;background:var(--surface);border-radius:8px}
.rep-actions{display:flex;gap:8px;margin-top:10px}
.act-btn{flex:1;padding:9px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-resolve{background:rgba(0,230,118,0.1);color:var(--success);border:1px solid rgba(0,230,118,0.2)}
.btn-dismiss{background:rgba(90,122,153,0.1);color:var(--muted);border:1px solid var(--border)}
.empty{text-align:center;padding:40px 10px}
.empty i{font-size:42px;color:var(--muted);opacity:.3;margin-bottom:12px;display:block}
.empty p{color:var(--muted);font-size:13px}
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:14px}
.skel-card{height:100px;margin-bottom:10px}
@keyframes shimmer{to{background-position:-200% 0}}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;display:flex;align-items:center;gap:8px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,22,38,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:200}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:4px;color:var(--muted);font-size:10px;text-decoration:none;transition:color .2s}
.nav-item i{font-size:20px}
.nav-item.active{color:var(--primary)}
.nav-item.active i{filter:drop-shadow(0 0 6px var(--primary))}
</style>
</head>
<body>

<div class="topbar">
  <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
  <div class="topbar-title"><i class="fa-solid fa-flag" style="color:var(--danger);font-size:15px;margin-right:8px"></i>Reports</div>
  <div class="pending-badge" id="pendingBadge">0 Pending</div>
</div>

<div class="chips">
  <div class="chip active" onclick="setFilter('all',this)">All</div>
  <div class="chip"        onclick="setFilter('pending',this)">Pending</div>
  <div class="chip"        onclick="setFilter('resolved',this)">Resolved</div>
  <div class="chip"        onclick="setFilter('dismissed',this)">Dismissed</div>
</div>

<div class="list" id="listWrap">
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
  <div class="skeleton skel-card"></div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle" style="color:var(--success)"></i><span id="toastMsg"></span></div>

<nav class="bottom-nav">
  <a class="nav-item" href="home.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a class="nav-item" href="groups.html"><i class="fa-solid fa-layer-group"></i><span>Groups</span></a>
  <a class="nav-item active" href="reports.html"><i class="fa-solid fa-flag"></i><span>Reports</span></a>
  <a class="nav-item" href="moderation.html"><i class="fa-solid fa-shield-halved"></i><span>Mods</span></a>
  <a class="nav-item" href="profile.html"><i class="fa-solid fa-circle-user"></i><span>Profile</span></a>
</nav>

<script>
const SUPABASE_URL      = 'https://mwxrklxxgwbaemqnbvda.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13eHJrbHh4Z3diYWVtcW5idmRhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NDI4MTYyOCwiZXhwIjoyMDc5ODU3NjI4fQ.mTfLl-MWCNfENzTX8E39fmlnMmVHNsif5uBFPcLpd28';
const sb  = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tg  = window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setBackgroundColor('#050a14');}
const userData = JSON.parse(sessionStorage.getItem('gp_user')||'null');
if(!userData){window.location.href='index.html';}

let allReports=[], currentFilter='all';

function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function relTime(ts){if(!ts)return'—';const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000),h=Math.floor(m/60),dy=Math.floor(h/24);return dy>0?dy+'d ago':h>0?h+'h ago':m>0?m+'m ago':'just now';}
function capFirst(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function setFilter(f,el){currentFilter=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');render();}

async function updateStatus(id,status){
  const {error}=await sb.from('reports').update({status,reviewed_by:userData.telegram_id,reviewed_at:new Date().toISOString()}).eq('id',id);
  if(!error){const r=allReports.find(r=>r.id===id);if(r)r.status=status;updateBadge();render();showToast(status==='resolved'?'Resolved':'Dismissed');}
}

function updateBadge(){
  const n=allReports.filter(r=>r.status==='pending').length;
  document.getElementById('pendingBadge').textContent=n+' Pending';
}

function render(){
  const filtered=currentFilter==='all'?allReports:allReports.filter(r=>r.status===currentFilter);
  const c=document.getElementById('listWrap');
  if(!filtered.length){
    c.innerHTML=`<div class="empty"><i class="fa-solid fa-flag"></i><p>No ${currentFilter==='all'?'':currentFilter+' '}reports found.</p></div>`;
    return;
  }
  c.innerHTML=filtered.map(r=>`
    <div class="rep-card ${r.status}">
      <div class="rep-header">
        <span class="rep-status st-${r.status}">${capFirst(r.status)}</span>
        <span class="rep-time">${relTime(r.reported_at)}</span>
      </div>
      <div class="users-row">
        <div class="u-tag u-reporter"><i class="fa-solid fa-user" style="font-size:10px"></i>${r.reporter_username?'@'+esc(r.reporter_username):r.reporter_id}</div>
        <div class="u-arrow"><i class="fa-solid fa-arrow-right" style="font-size:10px"></i></div>
        <div class="u-tag u-reported"><i class="fa-solid fa-user-slash" style="font-size:10px"></i>${r.reported_username?'@'+esc(r.reported_username):r.reported_user_id}</div>
      </div>
      <div class="rep-reason">${esc(r.reason||'No reason given')}</div>
      ${r.status==='pending'?`
      <div class="rep-actions">
        <button class="act-btn btn-resolve" onclick="updateStatus(${r.id},'resolved')"><i class="fa-solid fa-check"></i> Resolve</button>
        <button class="act-btn btn-dismiss" onclick="updateStatus(${r.id},'dismissed')"><i class="fa-solid fa-xmark"></i> Dismiss</button>
      </div>`:''}
    </div>`).join('');
}

async function init(){
  const {data:groups}=await sb.from('groups').select('chat_id').eq('added_by',userData.telegram_id);
  const cids=(groups||[]).map(g=>g.chat_id);
  if(!cids.length){document.getElementById('listWrap').innerHTML=`<div class="empty"><i class="fa-solid fa-flag"></i><p>No groups found.</p></div>`;return;}
  const {data}=await sb.from('reports').select('*').in('chat_id',cids).order('reported_at',{ascending:false});
  allReports=data||[];
  updateBadge();
  render();
}
init();
</script>
</body>
</html>
